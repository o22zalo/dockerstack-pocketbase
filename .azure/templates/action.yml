parameters:
  - name: dotenvrtdbUrl
    type: string
    default: ""

steps:
  - checkout: self
    displayName: "Checkout"

  - bash: bash .github/scripts/pull-env.sh
    displayName: "Pull .env from RTDB"
    env:
      DOTENVRTDB_URL: ${{ parameters.dotenvrtdbUrl }}

  - bash: dotenvrtdb -e .env -- bash .github/scripts/detect-os.sh
    displayName: "Detect OS environment"

  - bash: dotenvrtdb -e .env -- bash .github/scripts/setup-linux.sh
    displayName: "Setup environment (Linux)"

  - bash: dotenvrtdb -e .env -- node docker-compose/scripts/validate-env.js
    displayName: "Validate env"

  - bash: dotenvrtdb -e .env -- bash docker-compose/scripts/dc.sh up -d --build --remove-orphans
    displayName: "Build & start services (Linux)"

  - bash: docker image prune -f
    displayName: "Clean up unused images"

  - bash: |
      dotenvrtdb -e .env -- dotenvrtdb runner set-stoprunnerid
      dotenvrtdb -e .env -- dotenvrtdb runner keepalive
    displayName: "dotenvrtdb runner keepalive"

  - bash: dotenvrtdb -e .env -- bash .github/scripts/collect-artifacts.sh
    displayName: "Collect artifacts"
    condition: always()

  - task: PublishPipelineArtifact@1
    displayName: "Upload docker runtime artifacts"
    condition: always()
    inputs:
      targetPath: "artifacts/docker-runtime"
      artifact: "docker-runtime"
      publishLocation: pipeline
